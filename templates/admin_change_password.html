<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- SWEET ALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

/* BODY */
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: #222;
    padding: 15px;
}

.navbar a {
    color: white;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 5px;
    transition: 0.3s;
}

.navbar a:hover {
    background: #007BFF;
}

.logout {
    background: red;
}

/* CENTER */
.center-container {
    display: flex;
    justify-content: center;
    margin-top: 60px;
}

/* CARD */
.form-card {
    background: white;
    padding: 30px;
    width: 380px;
    border-radius: 15px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* PASSWORD BOX */
.password-box {
    position: relative;
}

.password-box i {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    background: #218838;
}

/* STRENGTH */
#strength {
    margin-top: 5px;
    font-weight: bold;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/dashboard">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/view_users">Users</a>
    <a href="/view_loans">Loans</a>
    <a href="/logout" class="logout">Logout</a>
</div>

<!-- FORM -->
<div class="center-container">

    <div class="form-card">
        <h2 style="text-align:center;">Change Admin Password</h2>

        <form method="POST">

            <label>Old Password</label>
            <input type="password" name="old_password" required>

            <label>New Password</label>
            <div class="password-box">
                <input type="password" id="password" name="new_password" required>
                <i id="eye" class="fa fa-eye" onclick="togglePassword()"></i>
            </div>

            <label>Confirm Password</label>
            <input type="password" id="confirm" name="confirm_password" required>

            <div id="strength"></div>

            <button id="submitBtn" disabled>Update</button>

        </form>
    </div>

</div>

<script>

// 👁️ TOGGLE
function togglePassword() {
    let input = document.getElementById("password");
    let eye = document.getElementById("eye");

    if (input.type === "password") {
        input.type = "text";
        eye.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        eye.classList.replace("fa-eye-slash", "fa-eye");
    }
}

// 🔐 VALIDATION
let password = document.getElementById("password");
let confirm = document.getElementById("confirm");
let strength = document.getElementById("strength");
let btn = document.getElementById("submitBtn");

password.addEventListener("input", check);
confirm.addEventListener("input", check);

function check() {
    let val = password.value;
    let conf = confirm.value;

    let strong = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if (!strong.test(val)) {
        strength.innerHTML = "Weak ❌";
        strength.style.color = "red";
        btn.disabled = true;
    } 
    else if (val !== conf) {
        strength.innerHTML = "Passwords not matching ❌";
        strength.style.color = "orange";
        btn.disabled = true;
    } 
    else {
        strength.innerHTML = "Strong ✅";
        strength.style.color = "green";
        btn.disabled = false;
    }
}

</script>

<!-- ✅ FLASH POPUP FIX (IMPORTANT CHANGE) -->
<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


</body>
</html>
