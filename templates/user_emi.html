<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    margin: 0;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button {
    background: #007bff;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.result {
    margin-top: 10px;
    font-size: 18px;
    text-align: center;
}
</style>

</head>

<body>

<div class="card">

<h2>EMI Calculator</h2>

<form method="POST">
    <input type="number" name="amount" placeholder="Loan Amount" required>
    <input type="number" name="rate" placeholder="Interest (%)" required>
    <input type="number" name="time" placeholder="Years" required>

    <button type="submit">Calculate EMI</button>
</form>

{% if emi %}
<div class="result">
    Monthly EMI: ₹ {{ emi | round(2) }}
</div>
{% endif %}

<a href="/user_dashboard" style="color:white; display:block; text-align:center;">⬅ Back</a>

</div>

</body>
</html>
