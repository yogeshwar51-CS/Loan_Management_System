{% extends "base.html" %}

{% block content %}

<h2>All Users</h2>

<table>
    <tr>
    <th>S.No</th>
    <th>User ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>        <!-- NEW -->
    <th>Address</th>      <!-- NEW -->
    <!-- <th>Password</th> -->
    <th>Action</th>
</tr>

    {% for user in users %}
<tr>
    <td>{{ loop.index }}</td>
    <td>{{ user[0] }}</td>
    <td>{{ user[1] }}</td>
    <td>{{ user[2] }}</td>
    <td>{{ user[3] }}</td> <!-- phone -->
    <td>{{ user[4] }}</td> <!-- address -->

    <!-- <td>
        {% if user[5] %}
            <span class="hidden-pass">••••••••</span>
            <span class="real-pass" style="display:none;">{{ user[5] }}</span>
            <button onclick="togglePass(this)">👁</button>
        {% else %}
            <span style="color:red;">None</span>
        {% endif %}
    </td> -->

    <td>
        <a href="/edit_user/{{ user[0] }}" class="btn edit-btn">Edit</a>
       <a href="#" onclick="confirmDelete('/delete_user/{{ user[0] }}') " class="btn delete-btn">Delete</a>
    </td>
</tr>
{% endfor %}
</table>

<!-- 🔥 SCRIPT -->
<script>
function togglePass(btn) {
    let td = btn.parentElement;
    let hidden = td.querySelector(".hidden-pass");
    let real = td.querySelector(".real-pass");

    if (real.style.display === "none") {
        real.style.display = "inline";
        hidden.style.display = "none";
        btn.innerHTML = "🙈";
    } else {
        real.style.display = "none";
        hidden.style.display = "inline";
        btn.innerHTML = "👁️";
    }
}
</script>

<!-- 🔥 STYLE -->
<style>
table {
    margin: auto;
    width: 90%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #4CAF50;
    color: white;
    padding: 12px;
}

td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

tr:hover {
    background: #f1f1f1;
}

button {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 16px;
}

.hidden-pass {
    letter-spacing: 2px;
}

.btn {
    padding: 5px 10px;
    border-radius: 5px;
    text-decoration: none;
    color: white;
}

.edit-btn {
    background: blue;
}

.delete-btn {
    background: red;
}
</style>

{% endblock %}
