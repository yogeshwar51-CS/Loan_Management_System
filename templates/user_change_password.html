<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    margin: 0;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
}

.input-group {
    position: relative;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

.eye {
    position: absolute;
    right: 10px;
    top: 15px;
    cursor: pointer;
}

button {
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.rules {
    font-size: 13px;
    margin-top: 5px;
}

.valid { color: #00ff88; }
.invalid { color: #ff4d4d; }

.strength-bar {
    height: 6px;
    border-radius: 5px;
    margin-top: 5px;
    background: #ccc;
}

.strength {
    height: 6px;
    border-radius: 5px;
    width: 0%;
    transition: 0.3s;
}
</style>
</head>

<body>

<div class="card">

<h2>Change Password 🔐</h2>

<form method="POST" onsubmit="return validateForm()">

    <!-- OLD PASSWORD -->
    <div class="input-group">
        <input type="password" id="old_password" name="old_password" placeholder="Old Password" required>
        <span class="eye" onclick="togglePassword('old_password')">👁️</span>
    </div>

    <!-- NEW PASSWORD -->
    <div class="input-group">
        <input type="password" id="new_password" name="new_password" placeholder="New Password" required onkeyup="checkStrength()">
        <span class="eye" onclick="togglePassword('new_password')">👁️</span>
    </div>

    <!-- STRENGTH -->
    <div class="strength-bar">
        <div id="strength" class="strength"></div>
    </div>

    <!-- RULES -->
    <div class="rules">
        <div id="length" class="invalid">• At least 8 characters</div>
        <div id="upper" class="invalid">• One uppercase letter</div>
        <div id="number" class="invalid">• One number</div>
        <div id="special" class="invalid">• One special character</div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="input-group">
        <input type="password" id="confirm_password" placeholder="Confirm Password" required>
        <span class="eye" onclick="togglePassword('confirm_password')">👁️</span>
    </div>

    <button type="submit">Update Password</button>

</form>

<a href="/user_dashboard" style="color:white; display:block; text-align:center; margin-top:10px;">
⬅ Back
</a>

</div>

<script>

// 👁️ TOGGLE PASSWORD
function togglePassword(id) {
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// 🔐 PASSWORD STRENGTH
function checkStrength() {
    let pass = document.getElementById("new_password").value;
    let strength = 0;

    let length = pass.length >= 8;
    let upper = /[A-Z]/.test(pass);
    let number = /[0-9]/.test(pass);
    let special = /[!@#$%^&*]/.test(pass);

    updateRule("length", length);
    updateRule("upper", upper);
    updateRule("number", number);
    updateRule("special", special);

    if (length) strength++;
    if (upper) strength++;
    if (number) strength++;
    if (special) strength++;

    let bar = document.getElementById("strength");

    if (strength == 1) {
        bar.style.width = "25%"; bar.style.background = "red";
    } else if (strength == 2) {
        bar.style.width = "50%"; bar.style.background = "orange";
    } else if (strength == 3) {
        bar.style.width = "75%"; bar.style.background = "yellow";
    } else if (strength == 4) {
        bar.style.width = "100%"; bar.style.background = "green";
    } else {
        bar.style.width = "0%";
    }
}

function updateRule(id, valid) {
    let el = document.getElementById(id);
    el.classList.toggle("valid", valid);
    el.classList.toggle("invalid", !valid);
}

// 🚫 FINAL CHECK
function validateForm() {
    let pass = document.getElementById("new_password").value;
    let confirm = document.getElementById("confirm_password").value;

    if (pass !== confirm) {
        Swal.fire("Error ❌", "Passwords do not match!", "error");
        return false;
    }

    if (pass.length < 8 ||
        !/[A-Z]/.test(pass) ||
        !/[0-9]/.test(pass) ||
        !/[!@#$%^&*]/.test(pass)) {

        Swal.fire("Error ❌", "Password does not meet requirements!", "error");
        return false;
    }

    return true;
}
</script>

<!-- ✅ SWEET ALERT HANDLER -->
<script>
{% if success %}
Swal.fire({
    icon: 'success',
    title: 'Password Updated 🎉',
    text: 'Your password has been changed successfully!',
    timer: 2000,
    showConfirmButton: false
}).then(() => {
    window.location.href = "/user_dashboard";
});
{% endif %}

{% if error %}
Swal.fire({
    icon: 'error',
    title: 'Error ❌',
    text: '{{ error }}'
});
{% endif %}
</script>

</body>
</html>
