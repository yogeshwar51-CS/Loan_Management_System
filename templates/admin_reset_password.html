{% extends "base.html" %}

{% block content %}

<style>
.container {
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 400px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
}

label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

select, input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.password-box {
    position: relative;
}

.toggle-eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

button {
    margin-top: 15px;
    width: 100%;
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}

#strength {
    font-weight: bold;
    margin-top: 5px;
}

#error {
    color: red;
    margin-top: 5px;
}
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="container">
    <div class="card">

        <h2>Reset User Password</h2>

        <!-- 🔥 FLASH MESSAGE -->
        

        <form method="POST">

            <!-- USER DROPDOWN -->
            <label>Select User:</label>
            <select name="user_id" required>
                <option value="">-- Select User --</option>
                {% for u in users %}
                    <option value="{{ u[0] }}">
                        {{ u[1] }} (ID: {{ u[0] }})
                    </option>
                {% endfor %}
            </select>

            <!-- PASSWORD -->
            <label>New Password:</label>
            <div class="password-box">
                <input type="password" id="password" name="password" required>
                <span class="toggle-eye" onclick="togglePassword()">
                    <i id="eye1" class="fa fa-eye"></i>
                </span>
            </div>

            <!-- CONFIRM -->
            <label>Confirm Password:</label>
            <div class="password-box">
                <input type="password" id="confirm_password" required>
                <span class="toggle-eye" onclick="toggleConfirmPassword()">
                    <i id="eye2" class="fa fa-eye"></i>
                </span>
            </div>

            <div id="strength"></div>
            <div id="error"></div>

            <button type="submit" id="submitBtn" disabled>Update Password</button>

        </form>

        <a href="/view_users">⬅ Back</a>

    </div>
</div>

<script>

// 👁️ PASSWORD TOGGLE
function togglePassword() {
    let input = document.getElementById("password");
    let eye = document.getElementById("eye1");

    input.type = input.type === "password" ? "text" : "password";
    eye.classList.toggle("fa-eye");
    eye.classList.toggle("fa-eye-slash");
}

// 👁️ CONFIRM TOGGLE
function toggleConfirmPassword() {
    let input = document.getElementById("confirm_password");
    let eye = document.getElementById("eye2");

    input.type = input.type === "password" ? "text" : "password";
    eye.classList.toggle("fa-eye");
    eye.classList.toggle("fa-eye-slash");
}

// 🔐 ELEMENTS
let passwordInput = document.getElementById("password");
let confirmInput = document.getElementById("confirm_password");
let submitBtn = document.getElementById("submitBtn");
let strength = document.getElementById("strength");
let error = document.getElementById("error");

// 🔐 REGEX
let strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

// 🔄 VALIDATION
function validateForm() {
    let pass = passwordInput.value;
    let confirmPass = confirmInput.value;

    error.innerHTML = "";

    if (!pass) {
        strength.innerHTML = "";
        submitBtn.disabled = true;
        return;
    }

    if (!strongRegex.test(pass)) {
        strength.innerHTML = "Weak password ❌";
        strength.style.color = "red";
        submitBtn.disabled = true;
        return;
    }

    strength.innerHTML = "Strong password ✅";
    strength.style.color = "green";

    if (pass !== confirmPass) {
        error.innerHTML = "Passwords do not match ❌";
        submitBtn.disabled = true;
        return;
    }

    submitBtn.disabled = false;
}

// EVENTS
passwordInput.addEventListener("input", validateForm);
confirmInput.addEventListener("input", validateForm);

// CONFIRM SUBMIT
document.querySelector("form").addEventListener("submit", function(e) {
    if (!confirm("Update password?")) {
        e.preventDefault();
    }
});

</script>

{% endblock %}
