<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <style>
body {
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    text-align: center;
    margin: 0;
}

.container {
    margin-top: 50px;
}

.card {
    background: white;
    padding: 25px;
    margin: 20px auto;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
}

h2 {
    color: #333;
}

input, select {
    width: 80%;
    padding: 10px;
    margin: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

a {
    display: block;
    margin: 10px;
    padding: 10px;
    background: #007BFF;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    width: 200px;
    margin-left: auto;
    margin-right: auto;
}

a:hover {
    background: #0056b3;
}

table {
    margin: auto;
    border-collapse: collapse;
    width: 80%;
    background: white;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
}

th {
    background: #4CAF50;
    color: white;
}
</style>
</head>
<body>

<h2>Change Password</h2>

<form method="POST">
    Old Password: <input type="password" name="old"><br><br>
    New Password: <input type="password" name="new"><br><br>
    Confirm Password: <input type="password" name="confirm"><br><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
