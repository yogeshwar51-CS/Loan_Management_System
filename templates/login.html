<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(to right, #918b8bfb, #813838);
    text-align: center;
    margin: 0;
}

.container {
    margin-top: 50px;
}

.card {
    background: white;
    padding: 25px;
    margin: auto;
    border-radius: 12px;
    width: 350px;
}

h2 { color: #333; }

input, select {
    width: 250px;
    padding: 10px;
    margin: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover { background: #45a049; }

#lockPopup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.popup-box {
    background: white;
    padding: 30px;
    width: 300px;
    text-align: center;
    border-radius: 10px;
    margin: 150px auto;
    animation: pop 0.3s ease;
}

@keyframes pop {
    from {transform: scale(0.7);}
    to {transform: scale(1);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>Admin Login</h2>

        <form method="POST">
            Username:<br>
            <input type="text" name="username" required><br>

            Password:<br>
            <input type="password" name="password" required><br><br>

            <button type="submit">Login</button>
        </form>

    </div>
</div>

<!-- {% include 'flash_messages.html' %} -->
 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<script>
document.addEventListener("DOMContentLoaded", function () {

    let messages = {{ messages | tojson | safe }};

    messages.forEach(function(item) {

        let category = item[0];
        let msg = item[1];

        let icon = "info";

        if (category === "success") icon = "success";
        else if (category === "danger") icon = "error";

        Swal.fire({
            icon: icon,
            title: msg,
            confirmButtonText: "OK"
        });

    });

});
</script>
{% endif %}
{% endwith %}


</body>
</html>
