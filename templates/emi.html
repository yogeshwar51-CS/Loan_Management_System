{% extends "base.html" %}

{% block content %}

<div class="container">
    <div class="card">

        <h2>EMI Calculator</h2>

        <!-- Loan Amount -->
        <label>Loan Amount</label>
        <input type="range" id="amount" min="10000" max="1000000" step="1000" value="100000">
        <p>₹ <span id="amount_val">100000</span></p>

        <!-- Interest -->
        <label>Interest Rate (%)</label>
        <input type="range" id="rate" min="1" max="15" step="0.1" value="6.5">
        <p><span id="rate_val">6.5</span>%</p>

        <!-- Time -->
        <label>Time (Years)</label>
        <input type="range" id="time" min="1" max="30" step="1" value="5">
        <p><span id="time_val">5</span> Years</p>

        <!-- Result -->
        <div class="result">
            EMI: ₹ <span id="emi">0</span><br>
            Total Interest: ₹ <span id="interest">0</span><br>
            Total Payment: ₹ <span id="total">0</span>
        </div>

    </div>
</div>

<script>
function calculateEMI() {
    let amount = parseFloat(document.getElementById('amount').value);
    let rate = parseFloat(document.getElementById('rate').value);
    let time = parseFloat(document.getElementById('time').value);

    let r = rate / (12 * 100);
    let n = time * 12;

    let emi = (amount * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
    emi = emi.toFixed(2);

    let total = (emi * n).toFixed(2);
    let interest = (total - amount).toFixed(2);

    document.getElementById('emi').innerText = emi;
    document.getElementById('total').innerText = total;
    document.getElementById('interest').innerText = interest;
}

// Update values + calculate
document.querySelectorAll('input[type="range"]').forEach(input => {
    input.addEventListener('input', () => {
        document.getElementById('amount_val').innerText = amount.value;
        document.getElementById('rate_val').innerText = rate.value;
        document.getElementById('time_val').innerText = time.value;

        calculateEMI();
    });
});

// Initial calculation
calculateEMI();
</script>

{% endblock %}
